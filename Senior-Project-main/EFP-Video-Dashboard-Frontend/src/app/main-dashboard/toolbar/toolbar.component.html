
<mat-toolbar>

  <!--Add in the logo-->
  <mat-toolbar-row>


  <mat-icon svgIcon="smallLogo" class="logoControl" aria-hidden="false"></mat-icon>


  <button mat-icon-button class="example-icon" aria-label="Example icon-button with menu icon">
    <mat-icon>menu</mat-icon>
  </button>
  <span>Escape From Poverty</span>
  <span class="example-spacer"></span>


<!--Search Bar-->
  <form class="search-form">
    <mat-form-field class="example-full-width" floatLabel="never">
      <input class="toolbar-search" type="text" matInput>
      <mat-placeholder>Search</mat-placeholder>
      <mat-icon matSuffix style="font-size: 1.2em">search</mat-icon>
    </mat-form-field>
  </form>


  <!--Bell icon/notifications-->
  <button mat-icon-button class="example-icon" aria-label="Example icon-button with bell icon">
    <mat-icon>notifications</mat-icon>
  </button>


  <!--Profile Picture-->
    <button mat-button [mat-menu-trigger-for]="menu">
      <mat-icon>account_circle</mat-icon>
    </button>


    <mat-menu #menu="matMenu">
      <button mat-menu-item>
        <mat-icon>person_outline</mat-icon>
        <span>Profile</span>
      </button>
      <button mat-menu-item>
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <button mat-menu-item>
        <mat-icon>logout</mat-icon>
        <span>Log Out</span>
      </button>
    </mat-menu>



  </mat-toolbar-row>
</mat-toolbar>
